app-id: com.bambulab.BambuStudio
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: bambu-studio
separate-locales: false

finish-args:
  # Netzwerk (Cloud-Druck, Updates)
  - --share=network
  # OpenGL / Hardware-Beschleunigung
  - --device=dri
  # X11 + XShm
  - --share=ipc
  - --socket=x11
  # Wayland (fallback auf X11 per env)
  - --socket=wayland
  # Audio (für Benachrichtigungstöne)
  - --socket=pulseaudio
  # Dateisystem: Benutzer-Dokumente und Downloads
  - --filesystem=home
  # D-Bus: Schlüsselbund (für gespeicherte Passwörter)
  - --talk-name=org.freedesktop.secrets
  # D-Bus: Desktop-Benachrichtigungen
  - --talk-name=org.freedesktop.Notifications
  # USB-Geräte für direkte Drucker-Verbindung
  - --device=all
  # Umgebungsvariablen
  - --env=GDK_BACKEND=x11
  - --env=BAMBU_PROFILE_DIRECTORY=/var/config/BambuStudio

modules:
  - name: bambu-studio
    buildsystem: simple
    build-commands:
      # Binaries und Libraries aus der extrahierten AppImage installieren
      - install -d /app/bin /app/lib /app/share
      - |
        if [ -d squashfs-root/usr/bin ]; then
          cp -a squashfs-root/usr/bin/. /app/bin/
        fi
      - |
        if [ -d squashfs-root/usr/lib ]; then
          cp -a squashfs-root/usr/lib/. /app/lib/
        fi
      - |
        if [ -d squashfs-root/usr/share ]; then
          cp -a squashfs-root/usr/share/. /app/share/
        fi
      # Remove ALL AppStream / desktop files shipped by the AppImage —
      # they can have invalid fields or duplicate IDs that break appstreamcli compose.
      - rm -rf /app/share/appdata
      - find /app/share/metainfo   -maxdepth 1 -name "*.xml"     -delete 2>/dev/null || true
      - find /app/share/applications -name "*.desktop"            -delete 2>/dev/null || true
      # Install our own clean AppStream metadata
      - install -Dm644 com.bambulab.BambuStudio.metainfo.xml
          /app/share/metainfo/com.bambulab.BambuStudio.metainfo.xml
      # Create a minimal, valid desktop file (avoids appstreamcli parse errors
      # caused by the AppImage's desktop file having non-standard fields)
      - |
        install -d /app/share/applications
        cat > /app/share/applications/com.bambulab.BambuStudio.desktop << 'DESKTOP_EOF'
        [Desktop Entry]
        Type=Application
        Name=BambuStudio
        GenericName=3D Printing Software
        Comment=Feature-rich slicer for Bambu Lab 3D printers
        Exec=bambu-studio %U
        Icon=com.bambulab.BambuStudio
        Terminal=false
        Categories=Graphics;3DGraphics;Engineering;
        MimeType=model/stl;model/3mf;application/vnd.ms-3mfdocument;application/prs.wavefront-obj;application/x-amf;x-scheme-handler/bambustudio;model/step;
        Keywords=3D;Printing;Slicer;slice;3D;printer;convert;gcode;stl;obj;amf;SLA
        StartupNotify=false
        StartupWMClass=bambu-studio
        DESKTOP_EOF
      # Icons installieren: 128px + 192px PNG, plus quadratisches SVG (128x128 viewBox)
      # BambuStudioBlack.svg ist ein 10x12 UI-Marker — NICHT das App-Icon.
      # BambuStudio.svg (128x128) und BambuStudio_128px.png sind die korrekten App-Icons.
      - install -Dm644 BambuStudio_128px.png
          /app/share/icons/hicolor/128x128/apps/com.bambulab.BambuStudio.png
      - install -Dm644 BambuStudio_192px.png
          /app/share/icons/hicolor/192x192/apps/com.bambulab.BambuStudio.png
      - install -Dm644 BambuStudio.svg
          /app/share/icons/hicolor/scalable/apps/com.bambulab.BambuStudio.svg
    sources:
      # squashfs-root/ wird vom CI-Workflow aus der AppImage extrahiert
      - type: dir
        path: squashfs-root
      # AppStream-Metadaten aus dem flatpak/-Verzeichnis
      - type: file
        path: com.bambulab.BambuStudio.metainfo.xml
      # Icons direkt aus dem Repository
      - type: file
        path: ../resources/images/BambuStudio_128px.png
        dest-filename: BambuStudio_128px.png
      - type: file
        path: ../resources/images/BambuStudio_192px.png
        dest-filename: BambuStudio_192px.png
      - type: file
        path: ../resources/images/BambuStudio.svg
        dest-filename: BambuStudio.svg
