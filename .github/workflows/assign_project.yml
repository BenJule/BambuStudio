name: Auto-assign to Project
run-name: "Assign #${{ github.event.issue.number || github.event.pull_request.number }}"

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  assign:
    name: Add to BambuStudio Development project
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name == 'issues' || github.event_name == 'pull_request'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: |
            api.github.com:443

      - name: Add to project board
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd  # v2.0.0
        with:
          project-url: https://github.com/users/BenJule/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}

      - name: Assign BenJule and set milestone
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const isPR   = !!context.payload.pull_request;
            const number = isPR
              ? context.payload.pull_request.number
              : context.payload.issue.number;

            await github.rest.issues.addAssignees({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: number,
              assignees:    ['BenJule'],
            });

            const current = isPR
              ? context.payload.pull_request.milestone
              : context.payload.issue.milestone;
            if (!current) {
              const { data: milestones } = await github.rest.issues.listMilestones({
                owner:     context.repo.owner,
                repo:      context.repo.repo,
                state:     'open',
                sort:      'due_on',
                direction: 'asc',
                per_page:  1,
              });
              if (milestones.length > 0) {
                await github.rest.issues.update({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: number,
                  milestone:    milestones[0].number,
                });
                core.info(`Set milestone: ${milestones[0].title}`);
              }
            } else {
              core.info(`Milestone already set: ${current.title} — skipping.`);
            }
