name: Claude Auto-Fix
run-name: "ai-fix — Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"

on:
  issues:
    types: [labeled]

permissions: read-all

jobs:
  autofix:
    name: Fix Issue #${{ github.event.issue.number }}
    if: github.event.label.name == 'ai-fix'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute branch name
        id: branch
        env:
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if echo "$ISSUE_LABELS" | grep -qiE '"bug"|"crash"|"regression"'; then
            prefix="fix"
          elif echo "$ISSUE_LABELS" | grep -qiE '"enhancement"|"feature"'; then
            prefix="feature"
          elif echo "$ISSUE_LABELS" | grep -qiE '"area: ci"|"area: build"'; then
            prefix="ci"
          else
            prefix="fix"
          fi
          slug=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//' \
            | cut -c1-40)
          echo "name=${prefix}/issue-${ISSUE_NUMBER}-${slug}" >> "$GITHUB_OUTPUT"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Restore Claude credentials
        run: |
          mkdir -p ~/.claude
          echo '${{ secrets.CLAUDE_CREDENTIALS }}' > ~/.claude/.credentials.json
          chmod 600 ~/.claude/.credentials.json

      - name: Run Claude auto-fix
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          timeout 1200 claude --dangerously-skip-permissions -p \
            "You are fixing a GitHub issue in the BambuStudio repository (a C++ 3D printing slicer fork).

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Description:
          ${ISSUE_BODY}

          Analyze the issue, find the relevant source files, and make the minimal necessary changes to fix it.
          Keep changes focused and correct. Do not modify unrelated files."

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG signing key
        if: steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/setup-gpg
        with:
          signing-key: ${{ secrets.GIT_SIGNING_KEY }}
          signing-key-passphrase: ${{ secrets.GIT_SIGNING_KEY_PASSPHRASE }}
          signing-key-id: ${{ secrets.GIT_SIGNING_KEY_ID }}

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "BenJule"
          git config user.email "benjamin.luetker@gmail.com"
          git checkout -b "${{ steps.branch.outputs.name }}"
          git add -A
          git commit -S -m "fix: automated fix for issue #${{ github.event.issue.number }}

          Closes #${{ github.event.issue.number }}"
          git push origin "${{ steps.branch.outputs.name }}"

      - name: Create PR and request Copilot review
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "fix: automated fix for issue #${{ github.event.issue.number }} — ${{ github.event.issue.title }}" \
            --body "This PR was automatically generated by Claude AI to address Issue #${{ github.event.issue.number }}.

          **Issue:** ${{ github.event.issue.title }}

          > Please review the changes carefully before merging.

          Closes #${{ github.event.issue.number }}" \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${{ steps.branch.outputs.name }}" \
            --assignee BenJule \
          )
          PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/requested_reviewers" \
            -X POST --field 'reviewers[]=copilot-pull-request-reviewer[bot]'
          echo "PR created: $PR_URL"

      - name: Comment on issue
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=$(gh pr list --head "${{ steps.branch.outputs.name }}" --json number --jq '.[0].number')
          gh issue comment "${{ github.event.issue.number }}" \
            --body "Automated fix generated in PR #${PR_NUM}. Copilot has been requested to review the changes."

      - name: Handle no changes
        if: steps.changes.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "Claude analyzed this issue but could not generate a fix automatically. Manual intervention required."
          gh issue edit "${{ github.event.issue.number }}" --remove-label "ai-fix"

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "The automated fix attempt failed. Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          gh issue edit "${{ github.event.issue.number }}" --remove-label "ai-fix"
